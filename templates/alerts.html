<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>

<body x-data="themeManager()" :class="darkMode ? '' : 'light'">
    <div class="app-container">
        <!-- Navigation Header -->
        <nav class="main-nav">
            <div class="nav-brand">
                <span class="brand-icon">⎈</span>
                <span class="brand-text">Multi-Cluster Dashboard</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/alerts" class="nav-link active">Alerts</a>
            </div>
            <div class="nav-actions">
                <button @click="toggle()" class="theme-toggle" :title="darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
                    <span x-show="darkMode">☀️</span>
                    <span x-show="!darkMode">🌙</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="text-gradient">Alerts</h1>
                <p class="page-subtitle">Active alerts across all clusters</p>
            </div>

            <!-- Alerts List -->
            <div id="alerts-container" class="alerts-list">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading alerts...</p>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="main-footer">
            <p>&copy; 2024 Multi-Cluster Dashboard</p>
        </footer>
    </div>

    <script>
        // ===== Theme Manager =====
        function themeManager() {
            return {
                darkMode: localStorage.getItem('darkMode') !== 'false',
                toggle() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('darkMode', this.darkMode);
                }
            };
        }

        let pollTimer = null;

        document.addEventListener('DOMContentLoaded', function() {
            fetchAlerts();
            pollTimer = setInterval(fetchAlerts, 10000);
        });

        function fetchAlerts() {
            fetch('/api/alerts')
                .then(res => {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(data => renderAlerts(data))
                .catch(err => {
                    console.error('Failed to fetch alerts:', err);
                });
        }

        function renderAlerts(data) {
            const container = document.getElementById('alerts-container');

            if (!data.alerts || data.alerts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state success">
                        <div class="empty-icon">✅</div>
                        <h3>All Clear!</h3>
                        <p>No active alerts. All clusters are operating normally.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            data.alerts.forEach(alert => {
                const severityClass = alert.severity.toLowerCase();
                const icon = alert.severity === 'Critical' ? '🚨' : '⚠️';
                let timestamp = '';
                if (alert.timestamp) {
                    const d = new Date(alert.timestamp);
                    timestamp = isNaN(d.getTime()) ? '' : d.toLocaleString();
                }

                html += `
                    <div class="alert-item ${severityClass}">
                        <div class="alert-icon">${icon}</div>
                        <div class="alert-content">
                            <div class="alert-header">
                                <span class="alert-cluster">${alert.cluster}</span>
                                <span class="alert-severity ${severityClass}">${alert.severity}</span>
                            </div>
                            <p class="alert-message">${alert.message}</p>
                            ${timestamp ? `<span class="alert-time">${timestamp}</span>` : ''}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
    </script>
</body>

</html>
